# golangci-lint v2設定ファイル
# クリーンアーキテクチャとDDDを意識した厳格な設定
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  # 有効なlinter
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - gosec
    - errname
    - errorlint
    - err113
    - gochecknoinits
    - goconst
    - gocognit
    - gocyclo
    - godot
    - goheader
    - goprintffuncname
    - noctx
    - nolintlint
    - rowserrcheck
    - unconvert
    - unparam
    - whitespace
    - wrapcheck
    - mnd
    - cyclop
    - funlen
    - nestif

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - fmt:.*
        - io/ioutil:^Read.*

    staticcheck:
      checks: ["all"]

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        - commentedOutCode # 日本語コメントを誤検知しやすいため無効化
        - tooManyResultsChecker # 既存の集計関数の戻り値設計を尊重
        - unnamedResult # 既存関数の戻り値命名は必須としない

    cyclop:
      max-complexity: 20
      package-average: 0.0

    funlen:
      lines: 120
      statements: 60

    nestif:
      min-complexity: 5

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
        - name: unexported-return
          severity: warning
          disabled: false
        - name: error-return
          severity: error
          disabled: false
        - name: error-naming
          severity: error
          disabled: false
        - name: var-naming
          severity: warning
          disabled: false
        - name: package-comments
          severity: warning
          disabled: false

    testpackage:
      skip-regexp: (export|internal)_test\.go

    gosec:
      excludes:
        - G104 # エラーを無視（意図的な場合がある）
        - G706 # ログ出力する GitHub ログイン名は文字種が限定されるため許容

    godox:
      keywords:
        - NOTE
        - OPTIMIZE
        - HACK

    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "24"
        - "30"
        - "60"
        - "365"
        - "4500"
        - "0644"
        - "0755"

  exclusions:
    # 生成コード（ent / gqlgen 等の "Code generated ... DO NOT EDIT" 付き）を除外
    generated: lax
    paths:
      - vendor
      - output
      - ".*\\.pb\\.go$"
      - ".*\\.gen\\.go$"
    # gofmt/goimports は ci-format ジョブの `gofmt -l .` で担保するため、ここでは強制しない
    rules:
      # テストファイルは一部のルールを緩和
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - err113
          - mnd
          - dupl
          - goconst
          - gocritic
          - noctx

# Go のフォーマットは gofmt ではなく gofumpt（より厳格）を使用する。
# `golangci-lint fmt` で適用、`golangci-lint fmt --diff` で CI チェックする。
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - vendor
      - ".*\\.pb\\.go$"
      - ".*\\.gen\\.go$"
